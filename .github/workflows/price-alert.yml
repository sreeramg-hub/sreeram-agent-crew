name: Price Alert

on:
  schedule:
    - cron: "15 * * * *"  # every hour at :15 past the hour
  workflow_dispatch:
    inputs:
      test_ntfy:
        description: "Send a test ntfy notification to verify delivery (yes/no)"
        required: false
        default: "no"

jobs:
  check-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python + dependencies
        run: uv sync

      - name: Test ntfy delivery (manual trigger only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_ntfy == 'yes' }}
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          echo "NTFY_TOPIC is set: $([ -n "$NTFY_TOPIC" ] && echo YES || echo NO)"
          echo "Posting test notification to ntfy.sh/$NTFY_TOPIC ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -d "Test from GitHub Actions — ntfy is working!" \
            -H "Title: Gold & Silver Agent — Test" \
            -H "Priority: high" \
            -H "Tags: white_check_mark" \
            "https://ntfy.sh/$NTFY_TOPIC")
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "SUCCESS" || echo "FAILED — check NTFY_TOPIC secret"

      - name: Run price alert check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PRICE_ALERT_THRESHOLD_USD: "50"
        run: uv run python -m sreeram_crew_scaffold.price_alert

      - name: Commit updated price state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/price_last_seen.json
          git diff --staged --quiet || git commit -m "chore: update price seen state [skip ci]"
          git push
