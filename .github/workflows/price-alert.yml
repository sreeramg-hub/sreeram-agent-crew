name: Price Alert

on:
  schedule:
    - cron: "15 * * * *"  # every hour at :15 past the hour
  workflow_dispatch:       # allow manual trigger for testing

jobs:
  check-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit last-seen price state

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python + dependencies
        run: uv sync

      - name: Run price alert check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PRICE_ALERT_THRESHOLD_USD: "75"
        run: uv run python -m sreeram_crew_scaffold.price_alert

      - name: Commit updated price state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/price_last_seen.json
          git diff --staged --quiet || git commit -m "chore: update price seen state [skip ci]"
          git push
