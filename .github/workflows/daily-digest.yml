name: Daily Gold & Silver Digest

on:
  schedule:
    # 11:00 UTC = ~6:00 AM US Eastern / ~4:30 PM IST
    # Adjust to your preferred local delivery time
    - cron: "0 11 * * *"
  workflow_dispatch:  # allow manual trigger for testing

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit state files back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python + dependencies
        run: uv sync

      - name: Write YouTube cookies file
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > cookies.txt
            echo "YOUTUBE_COOKIES_FILE=cookies.txt" >> $GITHUB_ENV
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Run crew
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: anthropic/claude-sonnet-4-6
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_RECIPIENT_EMAIL: ${{ secrets.DIGEST_RECIPIENT_EMAIL }}
          GOLD_CHANNEL_IDS: ${{ vars.GOLD_CHANNEL_IDS }}
          SILVER_CHANNEL_IDS: ${{ vars.SILVER_CHANNEL_IDS }}
          TRANSCRIPT_FETCH_DELAY: "3"
        run: uv run crewai run

      - name: Commit updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/gold_seen.json state/silver_seen.json
          git diff --staged --quiet || git commit -m "chore: update seen-video state [skip ci]"
          git push
